name: Release binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            ext: ''
          - os: macos-latest
            target: macos-arm64
            ext: ''
          - os: windows-latest
            target: windows-x64
            ext: '.exe'
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - name: Compile cueinfo
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          EXT: ${{ matrix.ext }}
        run: |
          mkdir -p dist
          dart compile exe bin/cueinfo.dart -o "dist/cueinfo-${TARGET}${EXT}"
      - name: Package archive
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          EXT: ${{ matrix.ext }}
          RUNNER_OS: ${{ runner.os }}
        run: |
          cd dist
          if [ "$RUNNER_OS" = "Windows" ]; then
            7z a "cueinfo-${TARGET}.zip" "cueinfo-${TARGET}${EXT}"
          else
            tar czf "cueinfo-${TARGET}.tar.gz" "cueinfo-${TARGET}${EXT}"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: cueinfo-${{ matrix.target }}
          path: dist/cueinfo-${{ matrix.target }}.*

  release:
    name: Attach to GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
